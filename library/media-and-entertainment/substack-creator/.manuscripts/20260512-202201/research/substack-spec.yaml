name: substack
description: "Every Substack feature, plus a local SQLite database, FTS over years of writing, and the only cross-publication portfolio view that exists."
cli_description: "Manage every Substack you own from one terminal: posts, drafts, notes, comments, subscribers, plus cross-publication churn diffs and full-text search across your archive."
version: "0.1.0"
base_url: "https://substack.com/api/v1"
http_transport: standard
health_check_path: "/profile"

auth:
  type: cookie
  format: "connect.sid={connect_sid}; substack.sid={substack_sid}"
  cookie_domain: "substack.com"
  cookies:
    - connect_sid
    - substack_sid

config:
  format: toml
  path: "~/.config/substack-pp-cli/config.toml"

mcp:
  transport: [stdio, http]

required_headers:
  - name: User-Agent
    value: "substack-pp-cli/0.1 (+https://github.com/JimPresting)"

resources:
  posts:
    description: "Read and interact with your published posts."
    endpoints:
      list:
        method: GET
        path: "/posts"
        description: "List your own posts (drafts + published)."
        params:
          - name: limit
            type: int
            default: 50
            description: "Maximum results to return"
          - name: offset
            type: int
            default: 0
            description: "Pagination offset"
        response:
          type: array
          item: Post
      get:
        method: GET
        path: "/posts/{slug}"
        description: "Get a single post by slug."
        params:
          - name: slug
            type: string
            required: true
            positional: true
            description: "Post slug"
        response:
          type: object
          item: Post
      stats:
        method: GET
        path: "/post/{post_id}/stats"
        description: "Engagement stats (likes/comments/restacks) for a post."
        params:
          - name: post_id
            type: string
            required: true
            positional: true
            description: "Post ID"
        response:
          type: object
          item: PostStats
      react:
        method: POST
        path: "/reaction"
        description: "React to a post (heart it)."
        body:
          - name: post_id
            type: string
            required: true
            description: "Post ID to react to"
          - name: emoji
            type: string
            default: "❤"
            description: "Reaction emoji"
        response:
          type: object
          item: Reaction
      restack:
        method: POST
        path: "/restack"
        description: "Restack a post to your Notes."
        body:
          - name: post_id
            type: string
            required: true
            description: "Post ID to restack"
          - name: comment
            type: string
            description: "Optional comment with the restack"
        response:
          type: object
          item: Restack

  drafts:
    description: "Manage post drafts."
    endpoints:
      list:
        method: GET
        path: "/post_management/drafts"
        description: "List your drafts."
        params:
          - name: limit
            type: int
            default: 50
            description: "Max drafts"
        response:
          type: array
          item: Draft
      create:
        method: POST
        path: "/drafts"
        description: "Create a new draft."
        body:
          - name: title
            type: string
            required: true
            description: "Draft title"
          - name: subtitle
            type: string
            description: "Draft subtitle"
          - name: body
            type: string
            description: "Body content (markdown or HTML)"
          - name: section_id
            type: string
            description: "Section ID to place the draft under"
          - name: audience
            type: string
            default: "everyone"
            description: "Audience: everyone, only_paid, founding"
        response:
          type: object
          item: Draft
      get:
        method: GET
        path: "/drafts/{id}"
        description: "Get a draft by ID."
        params:
          - name: id
            type: string
            required: true
            positional: true
            description: "Draft ID"
        response:
          type: object
          item: Draft
      update:
        method: PUT
        path: "/drafts/{id}"
        description: "Update an existing draft."
        params:
          - name: id
            type: string
            required: true
            positional: true
            description: "Draft ID"
        body:
          - name: title
            type: string
            description: "New title"
          - name: subtitle
            type: string
            description: "New subtitle"
          - name: body
            type: string
            description: "New body"
        response:
          type: object
          item: Draft
      publish:
        method: POST
        path: "/drafts/{id}/publish"
        description: "Publish a draft."
        params:
          - name: id
            type: string
            required: true
            positional: true
            description: "Draft ID"
        body:
          - name: send_email
            type: bool
            default: true
            description: "Send email to subscribers"
        response:
          type: object
          item: Post
      preview:
        method: GET
        path: "/drafts/{id}/preview"
        description: "Get an author-only preview link for a draft."
        params:
          - name: id
            type: string
            required: true
            positional: true
            description: "Draft ID"
        response:
          type: object
          item: PreviewLink
      delete:
        method: DELETE
        path: "/drafts/{id}"
        description: "Delete a draft."
        params:
          - name: id
            type: string
            required: true
            positional: true
            description: "Draft ID"

  notes:
    description: "Substack Notes (microblog)."
    endpoints:
      list:
        method: GET
        path: "/notes"
        description: "List your recent notes."
        params:
          - name: limit
            type: int
            default: 20
            description: "Max notes"
          - name: cursor
            type: string
            description: "Pagination cursor"
        response:
          type: array
          item: Note
        pagination:
          type: cursor
          cursor_field: cursor
      publish:
        method: POST
        path: "/comment/feed"
        description: "Publish a new note."
        body:
          - name: body
            type: string
            required: true
            description: "Note body (markdown)"
        response:
          type: object
          item: Note
      reply:
        method: POST
        path: "/comment/{note_id}/reply"
        description: "Reply to a note."
        params:
          - name: note_id
            type: string
            required: true
            positional: true
            description: "Parent note ID"
        body:
          - name: body
            type: string
            required: true
            description: "Reply body"
        response:
          type: object
          item: Note
      react:
        method: POST
        path: "/reaction/comment"
        description: "React to a note."
        body:
          - name: note_id
            type: string
            required: true
            description: "Note ID"
          - name: emoji
            type: string
            default: "❤"
            description: "Reaction emoji"
        response:
          type: object
          item: Reaction
      restack:
        method: POST
        path: "/comment/{note_id}/restack"
        description: "Restack a note."
        params:
          - name: note_id
            type: string
            required: true
            positional: true
            description: "Note ID to restack"
        response:
          type: object
          item: Restack

  comments:
    description: "Comments on posts."
    endpoints:
      list:
        method: GET
        path: "/post/{post_id}/comments"
        description: "List comments on a post."
        params:
          - name: post_id
            type: string
            required: true
            positional: true
            description: "Post ID"
          - name: limit
            type: int
            default: 50
            description: "Max comments"
        response:
          type: array
          item: Comment
      add:
        method: POST
        path: "/comment"
        description: "Add a comment to a post."
        body:
          - name: post_id
            type: string
            required: true
            description: "Post ID"
          - name: body
            type: string
            required: true
            description: "Comment body"
        response:
          type: object
          item: Comment
      react:
        method: POST
        path: "/reaction/comment"
        description: "React to a comment."
        body:
          - name: comment_id
            type: string
            required: true
            description: "Comment ID"
          - name: emoji
            type: string
            default: "❤"
            description: "Reaction emoji"
        response:
          type: object
          item: Reaction

  feed:
    description: "Your reader feed."
    endpoints:
      list:
        method: GET
        path: "/feed"
        description: "Get your feed."
        params:
          - name: tab
            type: string
            default: "for-you"
            enum: ["for-you", "following", "categories"]
            description: "Feed tab"
          - name: limit
            type: int
            default: 30
            description: "Max items"
        response:
          type: array
          item: FeedItem

  subscribers:
    description: "Manage your publication's subscribers."
    endpoints:
      list:
        method: GET
        path: "/publication/{publication_id}/subscribers"
        description: "List subscribers for a publication you own."
        params:
          - name: publication_id
            type: string
            required: true
            positional: true
            description: "Publication ID"
          - name: tier
            type: string
            enum: ["free", "paid", "founding", "all"]
            default: "all"
            description: "Tier filter"
          - name: limit
            type: int
            default: 100
            description: "Max rows"
        response:
          type: array
          item: Subscriber
      count:
        method: GET
        path: "/publication/{publication_id}/subscriber_count"
        description: "Get total subscriber counts (free + paid)."
        params:
          - name: publication_id
            type: string
            required: true
            positional: true
            description: "Publication ID"
        response:
          type: object
          item: SubscriberCount
      add:
        method: POST
        path: "/subscriber/add"
        description: "Add a subscriber by email."
        body:
          - name: email
            type: string
            required: true
            description: "Subscriber email"
          - name: publication_id
            type: string
            required: true
            description: "Publication ID to add to"
        response:
          type: object
          item: Subscriber
      export_free:
        method: GET
        path: "/free_subscribers/export"
        description: "Export free subscribers as CSV."
        params:
          - name: publication_id
            type: string
            description: "Publication ID (defaults to your primary)"
        response:
          type: object
          item: ExportResult
      export_paid:
        method: GET
        path: "/paid_subscribers/export"
        description: "Export paid subscribers as CSV."
        params:
          - name: publication_id
            type: string
            description: "Publication ID"
        response:
          type: object
          item: ExportResult

  sections:
    description: "Publication sections / categories."
    endpoints:
      list:
        method: GET
        path: "/publication/{publication_id}/sections"
        description: "List sections for a publication."
        params:
          - name: publication_id
            type: string
            required: true
            positional: true
            description: "Publication ID"
        response:
          type: array
          item: Section

  images:
    description: "Upload images to Substack's CDN."
    endpoints:
      upload:
        method: POST
        path: "/image"
        description: "Upload an image."
        body:
          - name: file
            type: string
            required: true
            description: "Path to image file"
        response:
          type: object
          item: UploadedImage

  categories:
    description: "Substack content categories."
    endpoints:
      list:
        method: GET
        path: "/categories"
        description: "List all global categories."
        no_auth: true
        response:
          type: array
          item: Category
      newsletters:
        method: GET
        path: "/category/{category_id}/newsletters"
        description: "List newsletters in a category."
        no_auth: true
        params:
          - name: category_id
            type: string
            required: true
            positional: true
            description: "Category ID"
          - name: limit
            type: int
            default: 30
            description: "Max newsletters"
        response:
          type: array
          item: Publication

  publications:
    description: "Search and inspect Substack publications globally."
    endpoints:
      search:
        method: GET
        path: "/publication/search"
        description: "Search publications by query."
        no_auth: true
        params:
          - name: query
            type: string
            required: true
            description: "Search query"
          - name: limit
            type: int
            default: 30
            description: "Max results"
          - name: page
            type: int
            default: 1
            description: "Page number"
        response:
          type: array
          item: Publication
      recommendations:
        method: GET
        path: "/publication/{publication_id}/recommendations"
        description: "List publications recommended by a given publication."
        no_auth: true
        params:
          - name: publication_id
            type: string
            required: true
            positional: true
            description: "Publication ID"
        response:
          type: array
          item: Publication

  profiles:
    description: "Read your own or another user's Substack profile."
    endpoints:
      me:
        method: GET
        path: "/profile"
        description: "Get your own profile and publications."
        response:
          type: object
          item: Profile
      get:
        method: GET
        path: "/profile/{handle}"
        description: "Get another user's profile by handle."
        no_auth: true
        params:
          - name: handle
            type: string
            required: true
            positional: true
            description: "User handle"
        response:
          type: object
          item: Profile

  me:
    description: "Your own subscriptions, follows, and personal recommendations."
    endpoints:
      subscriptions:
        method: GET
        path: "/me/subscriptions"
        description: "What you subscribe to."
        response:
          type: array
          item: Subscription
      follows:
        method: GET
        path: "/me/follows"
        description: "Profiles you follow."
        response:
          type: array
          item: Profile
      recommendations:
        method: GET
        path: "/me/recommendations"
        description: "Personal recommendations."
        response:
          type: array
          item: Publication

  dashboard:
    description: "Publication analytics and engagement stats."
    endpoints:
      stats:
        method: GET
        path: "/publication/{publication_id}/stats"
        description: "Aggregate dashboard stats for a publication you own."
        params:
          - name: publication_id
            type: string
            required: true
            positional: true
            description: "Publication ID"
          - name: window
            type: string
            default: "30d"
            description: "Window (e.g. 7d, 30d, 90d)"
        response:
          type: object
          item: DashboardStats

types:
  Post:
    fields:
      - name: id
        type: string
      - name: slug
        type: string
      - name: title
        type: string
      - name: subtitle
        type: string
      - name: publication_id
        type: string
      - name: publish_date
        type: string
      - name: post_date
        type: string
      - name: audience
        type: string
      - name: type
        type: string
      - name: body_html
        type: string
      - name: body_markdown
        type: string
      - name: word_count
        type: int
      - name: paywalled
        type: bool
      - name: scheduled_at
        type: string
      - name: canonical_url
        type: string

  PostStats:
    fields:
      - name: post_id
        type: string
      - name: views
        type: int
      - name: opens
        type: int
      - name: clicks
        type: int
      - name: likes
        type: int
      - name: comments
        type: int
      - name: restacks
        type: int

  Reaction:
    fields:
      - name: id
        type: string
      - name: emoji
        type: string
      - name: target_id
        type: string
      - name: target_type
        type: string
      - name: created_at
        type: string

  Restack:
    fields:
      - name: id
        type: string
      - name: post_id
        type: string
      - name: note_id
        type: string
      - name: comment
        type: string
      - name: created_at
        type: string

  Draft:
    fields:
      - name: id
        type: string
      - name: title
        type: string
      - name: subtitle
        type: string
      - name: body
        type: string
      - name: publication_id
        type: string
      - name: section_id
        type: string
      - name: audience
        type: string
      - name: scheduled_at
        type: string
      - name: last_edited
        type: string
      - name: paywall_markers
        type: bool

  PreviewLink:
    fields:
      - name: url
        type: string
      - name: expires_at
        type: string

  Note:
    fields:
      - name: id
        type: string
      - name: body
        type: string
      - name: author_handle
        type: string
      - name: posted_at
        type: string
      - name: like_count
        type: int
      - name: restack_count
        type: int
      - name: reply_count
        type: int
      - name: parent_id
        type: string

  Comment:
    fields:
      - name: id
        type: string
      - name: post_id
        type: string
      - name: body
        type: string
      - name: author_handle
        type: string
      - name: author_name
        type: string
      - name: posted_at
        type: string
      - name: reaction_count
        type: int

  FeedItem:
    fields:
      - name: id
        type: string
      - name: type
        type: string
      - name: post_id
        type: string
      - name: note_id
        type: string
      - name: title
        type: string
      - name: snippet
        type: string
      - name: publication_id
        type: string
      - name: posted_at
        type: string

  Subscriber:
    fields:
      - name: id
        type: string
      - name: email
        type: string
      - name: name
        type: string
      - name: tier
        type: string
      - name: status
        type: string
      - name: subscribed_at
        type: string
      - name: publication_id
        type: string

  SubscriberCount:
    fields:
      - name: publication_id
        type: string
      - name: free_count
        type: int
      - name: paid_count
        type: int
      - name: founding_count
        type: int
      - name: total
        type: int

  ExportResult:
    fields:
      - name: url
        type: string
      - name: expires_at
        type: string
      - name: row_count
        type: int

  Section:
    fields:
      - name: id
        type: string
      - name: name
        type: string
      - name: slug
        type: string
      - name: publication_id
        type: string

  UploadedImage:
    fields:
      - name: id
        type: string
      - name: url
        type: string
      - name: width
        type: int
      - name: height
        type: int

  Category:
    fields:
      - name: id
        type: string
      - name: name
        type: string
      - name: slug
        type: string

  Publication:
    fields:
      - name: id
        type: string
      - name: name
        type: string
      - name: subdomain
        type: string
      - name: custom_domain
        type: string
      - name: hero_image
        type: string
      - name: subscriber_count
        type: int
      - name: paid_subscriber_count
        type: int
      - name: description
        type: string

  Profile:
    fields:
      - name: id
        type: string
      - name: handle
        type: string
      - name: name
        type: string
      - name: bio
        type: string
      - name: photo_url
        type: string
      - name: publications
        type: string

  Subscription:
    fields:
      - name: publication_id
        type: string
      - name: tier
        type: string
      - name: subscribed_at
        type: string
      - name: publication_name
        type: string

  DashboardStats:
    fields:
      - name: publication_id
        type: string
      - name: window
        type: string
      - name: subscribers_total
        type: int
      - name: subscribers_paid
        type: int
      - name: subscribers_net_30d
        type: int
      - name: posts_published
        type: int
      - name: views_total
        type: int
      - name: opens_total
        type: int
      - name: top_post_id
        type: string
