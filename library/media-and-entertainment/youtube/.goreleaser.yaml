version: 2
project_name: youtube-pp-cli
changelog:
  disable: true
builds:
  - id: youtube-pp-cli
    main: ./cmd/youtube-pp-cli
    binary: youtube-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/youtube/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: youtube-pp-mcp
    main: ./cmd/youtube-pp-mcp
    binary: youtube-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: youtube-pp-cli
    repository:
      owner: justinwfu
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Search YouTube in bulk, grab transcripts, get embed snippets — for the photo-keywords-to-blog-post workflow."
    install: |
      bin.install "youtube-pp-cli"
      bin.install "youtube-pp-mcp"
