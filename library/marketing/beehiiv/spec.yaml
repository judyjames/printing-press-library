            values `"free"`, `"premium"`, or `"all"`. When `"all"` is provided,
            targets all subscriber tiers — free subscribers, and premium
            subscribers if the publication has an active paid tier.
        include_segment_ids:
          type: array
          items:
            $ref: '#/components/schemas/SegmentId'
