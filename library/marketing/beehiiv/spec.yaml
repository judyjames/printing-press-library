          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
