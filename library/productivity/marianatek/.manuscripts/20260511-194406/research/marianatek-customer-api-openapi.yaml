                    error: Authentication credentials were not provided.
          description: ''
        '503':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ServiceUnavailable:
                  value:
                    error: The server is temporarily unable to handle this request.
                  summary: Service Unavailable
          description: ''
    post:
      operationId: me_reservations_create
      description: 'Create a new reservation for the authenticated user. reservation_type
        accepts one of three defined values: `standard`, `standby`, and `waitlist`.
        `guest_email` is optional and should only be sent when `is_booked_for_me`
