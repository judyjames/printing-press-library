components:
  schemas:
    AccountBalance:
      type: object
      properties:
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        currency:
          type: string
        locations:
          type: array
          items:
            $ref: '#/components/schemas/SkinnyLocation'
          readOnly: true
      required:
      - amount
      - currency
      - locations
    Ad:
      type: object
      properties:
        image_url:
          type: string
          format: uri
        redirect_url:
          type: string
          format: uri
      required:
      - image_url
      - redirect_url
    AddOnsBuyPage:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        buy_page_sections:
          type: string
          readOnly: true
      required:
      - buy_page_sections
      - id
      - name
    AddOnsBuyPageSection:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        product_listings:
          type: string
          readOnly: true
        name:
          type: string
          readOnly: true
      required:
      - id
      - name
      - product_listings
    AddOnsProductListingWithVariants:
      type: object
      properties:
        id:
          type: string
          readOnly: true
        banner:
          type: string
        currency_code:
          type: string
          readOnly: true
        description:
          type: string
          readOnly: true
        is_in_stock:
          type: string
          readOnly: true
        is_live_stream:
          type: string
          readOnly: true
        is_promoted:
          type: string
          readOnly: true
        is_valid_promo_for_user:
          type: string
          readOnly: true
        name:
          type: string
          readOnly: true
        num_in_stock:
          type: string
          readOnly: true
        price:
          type: string
          readOnly: true
        price_incl_tax:
          type: string
          readOnly: true
        product_type:
          type: string
          readOnly: true
        product_display_attributes:
          type: array
          items:
            type: object
            additionalProperties:
              type: string
              nullable: true
          readOnly: true
        should_display_price_include_tax:
          type: string
          readOnly: true
        guest_usage:
          type: string
          readOnly: true
        tags:
          type: string
          readOnly: true
        locations:
          type: string
          readOnly: true
        should_show_cancellation_copy:
          type: string
          readOnly: true
        variants:
          type: string
          readOnly: true
      required:
      - banner
      - currency_code
      - description
      - guest_usage
      - id
      - is_in_stock
      - is_live_stream
      - is_promoted
      - is_valid_promo_for_user
      - locations
      - name
      - num_in_stock
      - price
      - price_incl_tax
      - product_display_attributes
      - product_type
      - should_display_price_include_tax
      - should_show_cancellation_copy
      - tags
      - variants
    AppNameEnum:
      enum:
      - android
      - ios
      - business
      - express
      type: string
      description: |-
        * `android` - Android App
        * `ios` - IOS App
        * `business` - Business App
        * `express` - Express App
    AppVersionMetadata:
      type: object
      description: |-
        Calls full_clean() on a model instance upon creation or update in order to identify
        invalid data and bubble Django's core validation errors through the serializers
        as DRF-friendly validation errors.
      properties:
        id:
          type: integer
          readOnly: true
        app_name:
          $ref: '#/components/schemas/AppNameEnum'
        app_version:
          type: string
          maxLength: 100
        is_mandatory:
          type: boolean
      required:
      - app_name
      - app_version
      - id
    Appointment:
      type: object
      description: |-
        Note that the appointment service doesn't directly have the concept of this data model.
        This represents the data returned by the schedule/booked endpoint.
      properties:
        id:
          type: string
          readOnly: true
        service_name:
          type: string
        service_description:
          type: string
          nullable: true
        instructor:
          $ref: '#/components/schemas/InstructorWithProfile'
        classroom:
          allOf:
          - $ref: '#/components/schemas/Classroom'
          nullable: true
        booking_status:
          type: string
          nullable: true
        attendance_status:
          type: string
          nullable: true
