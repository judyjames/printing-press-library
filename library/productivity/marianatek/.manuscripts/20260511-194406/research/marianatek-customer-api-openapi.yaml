    UserMembership:
      type: object
      description: |-
        Split out from the UserMembershipSerializer, which now inherits from this, to allow for more targeted
        and performant serialization of payment option data. The customer APIs payment_options endpoint is
        among our slowest, and thus we should ensure we only add extra computational work here when necessary.

        If a new field can be added to the UserMembershipSerializer without needing to be included in the payment_options,
        then add it there instead.
      properties:
        id:
          type: string
        adjustment_renewal_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,11}(?:\.\d{0,2})?$
        adjustment_renewal_rate_incl_tax:
          type: string
          format: decimal
          pattern: ^-?\d{0,98}(?:\.\d{0,2})?$
