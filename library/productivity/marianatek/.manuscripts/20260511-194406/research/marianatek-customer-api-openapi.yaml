  /me/appointments/bookings:
    get:
      operationId: me_appointments_bookings_list
      description: View a list of a user's appointments. Filter the bookings using
        `start_date`, `end_date`, and `is_upcoming` query parameters. If `is_upcoming`
        is true, defaults to upcoming appointments (today to 30 days later). If `is_upcoming`
        is false, defaults to historical appointments (30 days ago to today). is_upcoming
        will further filter the results for today's appointments based on the current
        time.If dates are not provided and `is_upcoming` is not specified, defaults
        to today and 30 days later.
      summary: List User Appointments
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
          format: date
        description: End date for the bookings in ISO format (YYYY-MM-DD).
      - in: query
        name: is_upcoming
        schema:
          type: boolean
        description: Filter for upcoming (true) or historical (false) appointments.
          If true, shows future appointments and filters out past ones from today.
          If false, shows historical appointments and filters out future ones from
          today.
      - in: query
        name: start_date
        schema:
          type: string
          format: date
        description: Start date for the bookings in ISO format (YYYY-MM-DD).
      tags:
      - Appointments
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: {}
                  description: Unspecified response body
              examples:
                ExampleResponse:
                  value:
                  - data:
                    - service_name: Yoga Class
                      instructor:
                        id: 6134
                        user:
                          id: 35080
                          full_name: David Fleming
                        public_profile:
                          id: 5321
                          thumbnail_photo_url: null
                      classroom:
                        id: '6256'
                        name: SkyBlue
                      booking_status: SCHEDULED
                      attendance_status: null
                      location_name: Solana Beach
                      start_datetime: '2025-08-28T19:00:00Z'
                      timezone: US/Pacific
                      duration: 3600
                      duration_formatted: 60 minutes
                      is_booked_for_me: true
                      guest_count: 1
                      guest_emails:
                      - <example-email>
                      id: '315202508281900'
                    meta:
                      pagination:
                        date_range:
                          start_date: '2025-08-06'
                          end_date: '2025-08-31'
                        filters:
                          provider_id: ''
                          provider_type: ''
                          location_id: ''
                          customer_id: '34901'
                  summary: Example Response
          description: ''
    post:
      operationId: me_appointments_bookings_create
      description: Book a new appointment for the authenticated customer. The customer
        is derived from the auth token; do not pass customer_id in the request body.
        The service duration is resolved automatically from the service_id.
      summary: Book an Appointment
      tags:
      - Appointments
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - service_id
              - location_id
              - providers
              - start_date
              - start_time
              - timezone
              - metadata
              properties:
                service_id:
                  type: integer
                  description: ID of the appointment service to book.
                location_id:
                  type: string
                  description: ID of the location where the appointment takes place.
                providers:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                        enum:
                        - employee
                        - classroom
                  description: List of providers for the appointment.
                start_date:
                  type: string
                  format: date
                  description: Appointment date in YYYY-MM-DD format.
                start_time:
                  type: string
                  format: time
                  description: Local start time in HH:MM format.
                timezone:
                  type: string
                  description: IANA timezone (e.g. America/New_York).
                metadata:
                  type: object
                  properties:
                    participants:
                      type: array
                      items:
                        type: object
                        properties:
                          payment_method:
                            type: string
                          payment_method_id:
                            type: integer
                          email:
                            type: string
                          is_guest:
                            type: boolean
            examples:
              ExampleRequest:
                value:
                  service_id: 312959
                  location_id: '123'
                  providers:
                  - id: '8'
                    type: employee
                  start_date: '2026-01-08'
                  start_time: '11:00'
                  timezone: America/New_York
                  metadata:
                    participants:
                    - payment_method: Credits
                      payment_method_id: 144902
                      email: ''
                      is_guest: false
                summary: Example Request
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                SuccessfulBooking:
                  value:
                    data:
                      id: 4521
                      service_id: 312959
                      customer_id: '34572'
                      location_id: '123'
                      providers:
                      - id: '8'
                        type: employee
                      start_date: '2026-01-08T16:00:00Z'
                      end_date: '2026-01-08T16:30:00Z'
                      start_time: '11:00'
                      timezone: America/New_York
                      duration: 1800
                      number_of_people: 1
                      metadata:
                        participants:
                        - payment_method: Credits
                          payment_method_id: 144902
                          email: ''
                          is_guest: false
                    meta: {}
                  summary: Successful Booking
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ServiceNotFound:
                  value:
                    error: 'Unable to resolve service: Service not found'
                  summary: Service Not Found
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                OnlineBookingDisabled(Tenant):
                  value:
                    error: Online appointment booking is not enabled.
                  summary: Online Booking Disabled (Tenant)
                ServiceNotAvailableForOnlineBooking:
                  value:
                    error: This service is not available for online booking.
                  summary: Service Not Available for Online Booking
          description: ''
        '422':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ValidationError:
                  value:
                    data:
                      service_id:
                      - This field is required.
                      providers:
                      - At least one provider is required.
                    meta: {}
                  summary: Validation Error
                BookingConflict:
                  value:
                    error:
                      type: BOOKING_CONFLICT
                      details:
                        conflicting_dates:
                        - date: '2026-01-08'
                          conflicts:
                          - code: CUSTOMER_ALREADY_BOOKED
                            message: Customer is already booked on one or more dates.
                  summary: Booking Conflict
          description: ''
        '500':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                InternalServerError:
                  value:
                    error: Unexpected error
                  summary: Internal Server Error
          description: ''
