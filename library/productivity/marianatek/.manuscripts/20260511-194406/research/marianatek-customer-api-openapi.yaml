      - purchase_signatures
      - remaining_commitment_length
      - remaining_renewal_count
      - remaining_usage_count
      - renewal_count
      - renewal_currency
      - renewal_rate
      - renewal_rate_incl_tax
      - should_display_price_include_tax
      - start_date
      - start_type
      - status
      - valid_locations
