openapi: 3.0.3
info:
  title: Customer API
  version: 1.0.0
  description: |-
    <h3>Quick Start</h3>
                    <p>Mariana Tek's Customer API gives you the power to build custom booking and buying experiences for fitness customers.
                    It can also be used to extend the functionality already offered by the Mariana Tek Web Integrations and mobile applications to keep your users engaged.</p>
                    <h3>Authentication</h3>
                    <p>The Customer API uses OpenAPI with <a href="https://tools.ietf.org/html/rfc6750">bearer auth</a> to authenticate requests.  You should obtain the access token for making authenticated requests using OAuth2.0. For more information, check out our <a href="https://marianatek.com/developers/guides/auth">authentication documentation.</a></p>
                    <ul>
                    <li>Flow: `authorizationCode`</li>
                    <li>Authorization URL = <a href="https://%7BBRAND%7D.marianatek.com/o/authorize">https://{BRAND}.marianatek.com/o/authorize</a></li>
                    <li>Token URL = <a href="https://%7BBRAND%7D.marianatek.com/o/token">https://{BRAND}.marianatek.com/o/token</a></li>
                    </ul>
                    <h3>Need help?</h3>
                    <p>Email integrations support: <a href='mailto:<vendor-integrations-email>'><vendor-integrations-email></a></p>
paths:
  /app_version_metadatas:
    get:
      operationId: app_version_metadatas_list
      description: View a list of the latest version details for Mariana Tek mobile
        applications, including if an update is mandatory for a given application.
      summary: List App Version Metadata
      parameters:
      - in: query
        name: app_name
        schema:
          type: string
          enum:
          - android
          - business
          - express
          - ios
        description: |-
          * `android` - Android App
          * `ios` - IOS App
          * `business` - Business App
          * `express` - Express App
      - in: query
        name: id
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Brand Config
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAppVersionMetadataList'
          description: ''
        '503':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ServiceUnavailable:
                  value:
                    error: The server is temporarily unable to handle this request.
                  summary: Service Unavailable
          description: ''
  /app_version_metadatas/{id}:
    get:
      operationId: app_version_metadatas_retrieve
      description: Get version metadata details about a single customer application,
        including version number.
      summary: Get App Version Metadata
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this app version metadata.
        required: true
      tags:
      - Brand Config
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppVersionMetadata'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ResourceNotFound:
                  value:
                    error: The specified resource cannot be found.
                  summary: Resource Not Found
          description: ''
        '503':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ServiceUnavailable:
                  value:
                    error: The server is temporarily unable to handle this request.
                  summary: Service Unavailable
          description: ''
  /appointments/categories:
    get:
      operationId: appointments_categories_list
      description: View a list of appointment service categories available for booking.
      summary: List Appointment Categories
      tags:
      - Appointments
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AppointmentCategoryList'
              examples:
                ExampleResponse:
                  value:
                  - categories:
                    - id: '1'
                      name: Personal Training
                  summary: Example Response
                EmptyResponse:
                  value:
                  - categories: []
                  summary: Empty Response
          description: ''
  /appointments/services/{id}/payment_options:
    get:
      operationId: appointments_services_payment_options_retrieve
      description: View all available payment options (credits) that can be used to
        book this service at the specified location. Returns separate lists for options
        that can be used for user bookings versus guest bookings. Each payment option
        includes detailed information about the credit, including any restrictions
        or limitations.
      summary: Get payment options for this service
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: The service ID
        required: true
      - in: query
        name: location_id
        schema:
          type: integer
        description: The location ID where the service will be booked
        required: true
      tags:
      - Appointments
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassPaymentOptions'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                BadRequest:
                  value:
                    error: location_id query parameter is required.
                  summary: Bad Request
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Forbidden:
                  value:
                    detail: Authentication is required to view payment options for
                      this service.
          description: ''
  /appointments/services/schedule_filters:
    get:
      operationId: appointments_services_schedule_filters_retrieve
      description: Returns the available filter choices (service names, instructors,
        classrooms) for appointment services at the specified location(s). Location
        scope is set by providing exactly one of location_id (one or more locations)
        or region_id (all locations in that region). Filters are based on location
        only (not date), so all services, instructors, and classrooms configured at
        the selected location(s) are returned regardless of current availability.
      summary: Get schedule filter options for appointment services
      parameters:
      - in: query
        name: location_id
        schema:
          type: string
        description: Location ID(s) as a comma-separated list (e.g. "1,2"). Same encoding
          as service_id. Mutually exclusive with region_id.
      - in: query
        name: region_id
        schema:
          type: integer
        description: Region ID. When provided, all locations in the region are used.
          Mutually exclusive with location_id.
      tags:
      - Appointments
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppointmentScheduleFilter'
              examples:
                Success:
                  value:
                    services:
                    - id: '1'
                      name: PT with Paige
                    - id: '2'
                      name: Life Coaching
                    instructors:
                    - id: '123'
                      name: Paige Smith
                      bio: null
                      photo_urls:
                        large_url: null
                        thumbnail_url: null
                    classrooms:
                    - id: '456'
                      name: Room A
                      location_id: 1
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                BadRequest-MissingLocationIdOrRegionId:
                  value:
                    error: Either location_id or region_id query parameter is required.
                  summary: Bad Request - Missing location_id or region_id
                BadRequest-MutuallyExclusive:
                  value:
                    error: location_id and region_id are mutually exclusive. Provide
                      one, not both.
                  summary: Bad Request - Mutually exclusive
                BadRequest-NoLocationsInRegion:
                  value:
                    error: No locations found for the given region_id.
                  summary: Bad Request - No locations in region
          description: ''
        '500':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /appointments/services/slots:
    get:
      operationId: appointments_services_slots_retrieve
      description: 'Retrieve computed availability slots for one or more services
        at one or more locations within a date range. Returns availability data organized
        by date, service, provider, and time slots. Each slot includes booking and
        availability counts. Each provider includes enriched details: instructor_details
        (for provider_type employee) with id, name, bio, photo_urls, and social links,
        or classroom_details (for provider_type classroom) with id and name, plus
        location_name.  Employee` providers are omitted when the instructor is inactive
        or not found in this tenant. Either service_id or service_category_id must
        be provided. Provide exactly one of location_id or region_id (mutually exclusive).'
      summary: Get computed availability slots for services
      parameters:
      - in: query
        name: end_date
        schema:
          type: string
          format: date
        description: End date for the availability range (YYYY-MM-DD format)
        required: true
      - in: query
        name: location_id
        schema:
          type: string
        description: Location ID(s) as a comma-separated list (e.g. "1,2"). Same encoding
          as service_id. Mutually exclusive with region_id.
      - in: query
        name: region_id
        schema:
          type: integer
        description: Region ID. When provided, all locations in the region are used.
          Mutually exclusive with location_id.
      - in: query
        name: service_category_id
        schema:
          type: string
          format: uuid
        description: Service category ID. When provided, fetches all active services
          in this category at the specified location(s) and returns availability for
          those services. Either service_id or service_category_id must be provided.
      - in: query
        name: service_id
        schema:
          type: string
        description: Service ID(s). Multiple values can be provided as comma-separated
          parameters. Either service_id or service_category_id must be provided.
      - in: query
        name: start_date
        schema:
          type: string
          format: date
        description: Start date for the availability range (YYYY-MM-DD format)
        required: true
      - in: query
        name: timezone
        schema:
          type: string
        description: Optionally pass an IANA timezone string to localize slot times.
          By default, uses timezone of first location_id for localization.
      tags:
      - Appointments
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    data:
                    - date: '2026-02-02'
                      services:
                      - service_id: '1'
                        service_name: PT with Paige
                        duration: 1800
                        capacity: 2
                        providers:
                        - provider_id: '6111'
                          provider_type: employee
                          location_id: '48731'
                          location_name: Downtown Studio
                          instructor_details:
                            id: '6111'
                            name: Paige Smith
                            bio: Personal trainer and wellness coach.
                            instagram_handle: paigesmith
                            instagram_url: https://instagram.com/paigesmith
                            photo_urls:
                              large_url: null
                              thumbnail_url: null
                            spotify_url: null
                          availability:
                            id: '1'
                            start_date: null
                            end_date: null
                            timezone: America/New_York
                          slots:
                          - start_time: '14:00'
                            booked_count: 0
                            available_count: 2
                            secondary_provider_id: '8842'
                          - start_time: '14:30'
                            booked_count: 0
                            available_count: 2
                        - provider_id: '6256'
                          provider_type: classroom
                          location_id: '48731'
                          location_name: Downtown Studio
                          classroom_details:
                            id: '6256'
                            name: Room A
                          availability:
                            id: '2'
                            start_date: null
                            end_date: null
                            timezone: America/New_York
                          slots:
                          - start_time: '15:00'
                            booked_count: 0
                            available_count: 2
                    meta:
                      date_range:
                        start_date: '2026-02-02'
                        end_date: '2026-02-02'
                      filters:
                        service_id:
                        - '1'
                        - '2'
                        provider_id: ''
                        provider_type: ''
                        location_id:
                        - '48731'
                        timezone: UTC
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                BadRequest-MissingLocationIdOrRegionId:
                  value:
                    error: Either location_id or region_id query parameter is required.
                  summary: Bad Request - Missing location_id or region_id
                BadRequest-MissingServiceIdOrServiceCategoryId:
                  value:
                    error: Either service_id or service_category_id query parameter
                      is required.
                  summary: Bad Request - Missing service_id or service_category_id
          description: ''
        '500':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ServerError:
                  value:
                    error: An error occurred while retrieving availability slots.
                  summary: Server Error
          description: ''
  /classes:
    get:
      operationId: classes_list
      description: 'View a paginated list of classes. Does not include private classes.
        Filter the class list using a chain of one or more of the following query
        parameters `min_start_date`, `max_start_date`, `min_start_time`, `max_start_time`,
        `region`, `location`, `is_live_stream`, `classroom`, `instructor`. Eg: **api/customer/v1/classes?location={location_id}&max_start_date={datetime_string}**'
      summary: List Classes
      parameters:
      - in: query
        name: class_tags
        schema:
          type: string
      - in: query
        name: class_type
        schema:
          type: string
      - in: query
        name: classroom
        schema:
          type: string
      - in: query
        name: instructor
        schema:
          type: string
      - in: query
        name: is_cancelled
        schema:
          type: boolean
      - in: query
        name: is_live_stream
        schema:
          type: boolean
      - in: query
        name: location
        schema:
          type: string
      - in: query
        name: max_datetime
        schema:
          type: string
          format: date-time
      - in: query
        name: max_start_date
        schema:
          type: string
          format: date
      - in: query
        name: max_start_time
        schema:
          type: string
          format: time
      - in: query
        name: min_datetime
        schema:
          type: string
          format: date-time
      - in: query
        name: min_start_date
        schema:
          type: string
          format: date
      - in: query
        name: min_start_time
        schema:
          type: string
          format: time
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: region
        schema:
          type: string
      tags:
      - Class Schedules
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedClassWithReservationsList'
          description: ''
        '503':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ServiceUnavailable:
                  value:
                    error: The server is temporarily unable to handle this request.
                  summary: Service Unavailable
          description: ''
  /classes/{id}:
    get:
      operationId: classes_retrieve
      description: View details about a single class. If this is a pick-a-spot class,
        the response will include layout data that can be used to render a map of
        the class.
      summary: Get Class Details
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this class session.
        required: true
      tags:
      - Class Schedules
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassWithReservationsAndLayout'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ResourceNotFound:
                  value:
                    error: The specified resource cannot be found.
                  summary: Resource Not Found
          description: ''
        '503':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ServiceUnavailable:
                  value:
                    error: The server is temporarily unable to handle this request.
                  summary: Service Unavailable
          description: ''
  /classes/{id}/payment_options:
    get:
      operationId: classes_payment_options_retrieve
      description: View all available payment options (credits or memberships) that
        can be used to book this class. Returns separate lists for options that can
        be used for user bookings versus guest bookings. Each payment option includes
        detailed information about the membership or credit, including any restrictions
        or limitations.
      summary: Get payment options for this class
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this class session.
        required: true
      tags:
      - Class Payment Options
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClassPaymentOptions'
          description: ''
        '404':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ResourceNotFound:
                  value:
                    error: The specified resource cannot be found.
                  summary: Resource Not Found
          description: ''
        '503':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ServiceUnavailable:
                  value:
                    error: The server is temporarily unable to handle this request.
                  summary: Service Unavailable
          description: ''
  /config:
    get:
      operationId: config_retrieve
      description: Retrieve brand configuration settings including appearance, contact
        info, and business settings.
      summary: Get Configuration
      tags:
      - Brand Config
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
          description: ''
        '503':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ServiceUnavailable:
                  value:
                    error: The server is temporarily unable to handle this request.
                  summary: Service Unavailable
          description: ''
  /countries:
    get:
      operationId: countries_list
      description: View a list of countries that can be associated with user addresses.
      summary: List Countries
      parameters:
      - in: query
        name: iso_3166_1_a2
        schema:
          type: string
      - in: query
        name: name
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      tags:
      - Payment Methods
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCountryList'
          description: ''
        '503':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ServiceUnavailable:
                  value:
                    error: The server is temporarily unable to handle this request.
                  summary: Service Unavailable
          description: ''
  /countries/{iso_3166_1_a2}:
    get:
      operationId: countries_retrieve
      description: View information about a single country.
      summary: Get Country Details
      parameters:
      - in: path
        name: iso_3166_1_a2
        schema:
          type: string
          title: ISO 3166-1 alpha-2
        description: A unique value identifying this country.
        required: true
      tags:
      - Payment Methods
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Country'
          description: ''
        '503':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ServiceUnavailable:
                  value:
                    error: The server is temporarily unable to handle this request.
                  summary: Service Unavailable
          description: ''
  /feedback/show_csat:
    get:
      operationId: feedback_show_csat_retrieve
      description: Check if the user should be shown a CSAT survey for an instructor.
        Returns whether the user has an active survey available for the specified
        instructor.
      summary: Check if CSAT survey should be shown
      tags:
      - Feedback
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                SurveyAvailable:
                  value:
                    should_complete_survey: true
                  summary: Survey Available
                NoSurveyAvailable:
                  value:
                    should_complete_survey: false
                  summary: No Survey Available
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                MissingInstructorName:
                  value:
                    instructor_name: Missing instructor name
                  summary: Missing Instructor Name
          description: ''
  /feedback/submit_csat:
    post:
      operationId: feedback_submit_csat_create
      description: Submit a CSAT (Customer Satisfaction) survey response for an instructor.
      summary: Submit CSAT survey response
      tags:
      - Feedback
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: {}
            examples:
              ValidRequest:
                value:
                  instructor_name: John Doe
                  rating: 5
                  feedback:
                  - Cleanliness
                  - Workout Intensity
                  comment: I loved the class!
                  privacy_choice: public
                summary: Valid Request
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      responses:
        '202':
          description: No response body
        '422':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                InvalidPrivacyChoice:
                  value:
                    privacy_choice: 'Invalid privacy choice. Must be one of: (''public'',
                      ''private'', ''anonymous'')'
                  summary: Invalid Privacy Choice
                MissingInstructorName:
                  value:
                    instructor_name: Missing instructor_name
                  summary: Missing Instructor Name
          description: ''
  /legal:
    get:
      operationId: legal_retrieve
      description: Retrieve legal configuration information for a brand including
        terms of service, privacy policy, and other legal documents.
      summary: Get Legal Configuration
      tags:
      - Brand Config
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LegalConfig'
          description: ''
        '503':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                ServiceUnavailable:
                  value:
                    error: The server is temporarily unable to handle this request.
                  summary: Service Unavailable
          description: ''
  /locations:
    get:
      operationId: locations_list
      description: View a paginated list of available locations.
      summary: List Locations
      parameters:
      - in: query
        name: id
        schema:
          type: integer
      - in: query
        name: name
        schema:
          type: string
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: region
        schema:
          type: integer
      tags:
      - Locations
