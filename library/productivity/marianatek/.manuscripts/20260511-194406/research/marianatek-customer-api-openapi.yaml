      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bankcard_id:
                  type: string
                  description: Optional bankcard ID to use for the renewal payment.
                    If not provided, the system will search for an available payment
                    method.
                  example: '123'
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Success:
                  value:
                    stripe_payment_intent_id: pi_3Mxxxxxx
                    stripe_publishable_api_key: pk_test_xxxxxxxxxxxxx
                    client_secret: pi_3Mxxxxxx_secret_xxxxxxxxx
                    basket_id: 123
                    stripe_payment_method_id: pm_1xxxxxx
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                Unauthorized:
                  value:
                    Error: You can only create renewal baskets for your own memberships
