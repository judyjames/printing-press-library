        schema:
          type: string
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: page_size
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - check in
          - class cancelled
          - graced cancel
          - graced no show
          - no fee no show
          - penalty cancel
          - penalty no show
          - penalty removed
          - pending
          - removed
          - standard cancel
        description: |-
          * `pending` - Pending
          * `check in` - Checked In
          * `standard cancel` - Standard Cancel
          * `penalty cancel` - Penalty Cancel
          * `graced cancel` - Graced Cancel
          * `penalty no show` - Penalty No Show
          * `no fee no show` - No Fee No Show
          * `graced no show` - Graced No Show
          * `removed` - Removed
          * `class cancelled` - Class Cancelled
          * `penalty removed` - Penalty Removed
      tags:
      - Reservations
      security:
      - OAuth Authorization: []
      - Session Authorization: []
