          type: string
          format: date-time
          readOnly: true
        freeze_start_date:
          type: string
          format: date-time
          readOnly: true
        freeze_end_date:
          type: string
          format: date-time
          readOnly: true
        guest_remaining_usage_count:
          type: integer
        guest_usage_limit:
          type: integer
          readOnly: true
        is_active:
          type: string
          readOnly: true
        is_charge_declined:
          type: string
          readOnly: true
        name:
          type: string
        next_charge_date:
          type: string
          format: date-time
          readOnly: true
        payment_interval:
          type: string
        payment_interval_length:
          type: integer
        penalty_fee_failure_date:
          type: string
          format: date-time
          readOnly: true
        product_id:
          type: string
        purchase_date:
          type: string
          format: date-time
          readOnly: true
        purchase_location:
          allOf:
          - $ref: '#/components/schemas/Location'
          nullable: true
          readOnly: true
        purchase_signatures:
          type: string
          readOnly: true
        remaining_renewal_count:
          type: integer
        remaining_usage_count:
          type: integer
        renewal_count:
          type: integer
        renewal_currency:
          type: string
          readOnly: true
        renewal_rate:
          type: number
          format: double
          maximum: 1000000000000000000
          minimum: -1000000000000000000
          exclusiveMaximum: true
          exclusiveMinimum: true
        renewal_rate_incl_tax:
          type: string
          format: decimal
          pattern: ^-?\d{0,98}(?:\.\d{0,2})?$
          readOnly: true
        should_display_price_include_tax:
          type: boolean
          readOnly: true
