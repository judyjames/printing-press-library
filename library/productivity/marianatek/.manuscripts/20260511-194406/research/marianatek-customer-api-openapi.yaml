  /me/memberships/{id}/cancel_membership:
    post:
      operationId: me_memberships_cancel_membership_create
      description: |-
        Cancel a membership_instance.

        This cancels a membership instance, but allows it to be used until the end of
        the current payment interval.

        Valid values for the (optional) cancellation_reason param, as well as customer friendly display strings,
         can be obtained from the membership_cancellation_reasons endpoint.

        {
            "cancellation_reason": "injury" (optional)
            "cancellation_note": "I fell off the reformer machine and twisted my ankle" (optional)
        }
      summary: Cancel a membership instance
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        description: A unique integer value identifying this membership instance.
        required: true
      tags:
      - Membership - Cancellation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cancellation_reason:
                  type: string
                  description: Reason for cancellation (optional -- if provided, supply
                    a valid reason as returned from membership_cancellation_reasons).
                  example: injury
                cancellation_note:
                  type: string
                  description: Additional notes for cancellation (optional).
                  example: I fell off the reformer machine and twisted my ankle.
      security:
      - OAuth Authorization: []
      - Session Authorization: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMembership'
          description: ''
        '400':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                InvalidCancellationReason:
                  value:
                    Error: 'Invalid consumer membership cancellation reason: invalid_reason'
                  summary: Invalid Cancellation Reason
          description: ''
        '403':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
              examples:
                UnauthorizedCancellation:
                  value:
                    Error: You can only cancel your own membership
                  summary: Unauthorized Cancellation
                IneligibleForCancellation:
                  value:
                    Error: This membership is not eligible for customer cancellation
                  summary: Ineligible for Cancellation
          description: ''
  /me/memberships/{id}/renewal_intent:
    post:
      operationId: me_memberships_renewal_intent_create
      description: Creates a renewal basket and payment intent for a membership instance
        in payment failure status. Optionally pass a bankcard_id to use for the renewal
        payment; if not provided, the system will search for an available payment
        method. Returns the Stripe PaymentIntent ID, client secret, and other relevant
        information to complete the payment on-session.
